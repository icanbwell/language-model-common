name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: write
  statuses: write

# Prevent duplicate runs on the same ref and cancel in-progress on PR updates to save CI minutes
concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre_commit:
    name: Pre-commit
    runs-on: main
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Docker Compose v2
        run: |
          if ! docker compose version &>/dev/null; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate JFrog credentials
        env:
          JFROG_READ_USER: ${{ secrets.JFROG_READ_USER }}
          JFROG_READ_TOKEN: ${{ secrets.JFROG_READ_TOKEN }}
        run: |
          if [ -z "$JFROG_READ_USER" ] || [ -z "$JFROG_READ_TOKEN" ]; then
            echo "ERROR: JFROG_READ_USER and JFROG_READ_TOKEN secrets are required but not set."
            exit 1
          fi

      - name: Build pre-commit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./pre-commit.Dockerfile
          push: false
          load: true
          tags: pre-commit-languagemodelcommon
          cache-from: type=gha,scope=precommit-v2
          cache-to: type=gha,mode=max,scope=precommit-v2
          secrets: |
            jfrog_user=${{ secrets.JFROG_READ_USER }}
            jfrog_token=${{ secrets.JFROG_READ_TOKEN }}

      - name: Create pre-commit cache volume
        run: docker volume create pre-commit-cache || true

      - name: Run pre-commit
        run: |
          docker run --rm \
            -v pre-commit-cache:/.cache/pre-commit \
            -v "${{ github.workspace }}":/sourcecode \
            pre-commit-languagemodelcommon

  build_and_test:
    name: Build and Test
    runs-on: main
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Docker Compose v2
        run: |
          if ! docker compose version &>/dev/null; then
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
              -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate JFrog credentials
        env:
          JFROG_READ_USER: ${{ secrets.JFROG_READ_USER }}
          JFROG_READ_TOKEN: ${{ secrets.JFROG_READ_TOKEN }}
        run: |
          if [ -z "$JFROG_READ_USER" ] || [ -z "$JFROG_READ_TOKEN" ]; then
            echo "ERROR: JFROG_READ_USER and JFROG_READ_TOKEN secrets are required but not set."
            exit 1
          fi

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: languagemodelcommon:local
          cache-from: type=gha,scope=languagemodelcommon-image-v2
          cache-to: type=gha,mode=max,scope=languagemodelcommon-image-v2
          secrets: |
            jfrog_user=${{ secrets.JFROG_READ_USER }}
            jfrog_token=${{ secrets.JFROG_READ_TOKEN }}

      - name: touch docker.env
        run: touch docker.env

      - name: up
        env:
          JFROG_READ_USER: ${{ secrets.JFROG_READ_USER }}
          JFROG_READ_TOKEN: ${{ secrets.JFROG_READ_TOKEN }}
        run: docker compose up -d --remove-orphans

      - name: Set correct permissions for tests
        run: |
          sudo chmod -R 777 ${{ github.workspace }}

      - name: Create reports output folder
        run: |
          mkdir -p ${{ github.workspace }}/reports
          chmod -R 777 ${{ github.workspace }}/reports

      - name: tests
        run: |
          docker compose run --rm -v ${{ github.workspace }}/reports:/reports dev pytest . --tb=auto --junitxml=/reports/test-results.xml

      - name: Upload pytest test results
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: ${{ github.workspace }}/reports/**/*.xml
        if: ${{ always() }}

      - name: Verify reports are generated
        if: ${{ always() }}
        run: ls -halt ${{ github.workspace }}/reports/

      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          path: ${{ github.workspace }}/reports/*.xml
          summary: true
          display-options: fEX
          fail-on-empty: true
          title: Test results

      - name: Cleanup
        if: always()
        run: |
          docker compose down --volumes || true

      - name: 'Cleanup build folder'
        if: always()
        run: |
          ls -la ./
          sudo rm -rf ${{ github.workspace }}/*
          ls -la ./
