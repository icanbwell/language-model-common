# This workflow builds release artifacts, attaches them to the GitHub Release,
# and publishes them to JFrog Artifactory.

name: Build and Publish Release Artifacts

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set release tag in VERSION
        run: echo "${{ github.event.release.tag_name }}" > VERSION

      - name: Install dependencies
        run: pip install -U pip setuptools wheel build

      - name: Build package
        run: python -m build --outdir dist/

      - name: Attach release artifacts to GitHub Release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List files in dist
        run: ls -haltR dist

      - name: Persist wheels directory
        uses: actions/upload-artifact@v7
        with:
          name: wheel_${{ github.event.release.tag_name }}
          path: dist/*.whl
          if-no-files-found: error
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish wheel to Jfrog Artifactory PyPI
        run: |
          python -m pip install --upgrade twine
          twine upload --repository-url ${{ vars.JF_URL }}/artifactory/api/pypi/bwell-pypi dist/*
        env:
          TWINE_USERNAME: cloud_infrastructure@icanbwell.com
          TWINE_PASSWORD: ${{ secrets.ARTIFACTORY_TOKEN }}
